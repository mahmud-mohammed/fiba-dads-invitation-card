<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maj Gen. (RTD) HT Wesley | Birthday Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background-overlay"></div>

<main class="invitation-card">

    <div class="gold-circle circle-one"></div>
    <div class="gold-circle circle-two"></div>

    <p class="small-heading">60 YEARS OF GRACE • HONOUR • SERVICE</p>

    <h1 class="birthday-title">Birthday</h1>
    <h2 class="party-title">Celebration</h2>

    <div class="divider"></div>

    <h3 class="celebrant">
        MAJ GEN. (RTD)
        <span>HT WESLEY</span>
    </h3>
    <div class="divider"></div>

    <h4 class="access-title">Guest Access</h4>

    <p class="access-text">
        Enter your name and the password provided on your invitation
        to unlock your Guest Pass at the main gate
    </p>

    <div class="name-box">
        <input id="guestName" type="text" placeholder="Enter Your Name" autocomplete="name">
    </div>

    <div class="password-box">
        <input id="password" type="password" placeholder="Enter Password">
        <button type="button" id="togglePassword">👁</button>
    </div>

    <button class="unlock-btn" onclick="checkPassword()">Unlock Access</button>

    <p id="errorMessage" class="error-message"></p>

</main>

<script src="script.js"></script>
</body>
</html>
